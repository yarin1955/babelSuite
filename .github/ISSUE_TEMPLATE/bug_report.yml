name: Bug Report
description: Report a bug or unexpected behavior in BabelSuite
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill in as much detail as possible.
        Before submitting, check [existing issues](https://github.com/babelsuite/babelsuite/issues) to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: BabelSuite Version
      description: Output of `git rev-parse --short HEAD` or the release tag.
      placeholder: "e.g. v0.4.1 or abc1234"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Control Plane (server)
        - Frontend (UI)
        - Execution Engine
        - Catalog / Registry
        - Suite Loading / Topology
        - Mocking
        - Agent / Remote Worker
        - CLI (babelctl)
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 24.04, macOS 14, Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start the server with `go run ./cmd/server`
        2. Navigate to /catalog
        3. Click ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      description: Paste any relevant server logs, browser console errors, or stack traces. Will be formatted as code.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant — configuration, suite topology, Docker version, etc.
