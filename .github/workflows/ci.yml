name: BabelSuite CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        check-latest: true

    - name: Build Main Engine
      run: |
        go mod tidy
        go build -v -o babelsuite main.go

    - name: Build Hub Backend
      run: |
        cd hub-backend
        go mod tidy
        go build -v -o hub-backend main.go

  build-react:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build Engine UI
      working-directory: ./ui
      run: |
        npm ci || npm install
        npm run build

    - name: Build Hub UI
      working-directory: ./hub-ui
      run: |
        npm ci || npm install
        npm run build
