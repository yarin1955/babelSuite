syntax = "proto3";

package babelsuite.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/babelsuite/babelsuite/backend/gen/babelsuite/v1;bsv1";

service SuiteService {
  rpc ListSuites(google.protobuf.Empty) returns (ListSuitesResponse) {
    option (google.api.http) = {
      get: "/api/v1/suites"
    };
  }

  rpc GetSuite(GetSuiteRequest) returns (SuiteDefinition) {
    option (google.api.http) = {
      get: "/api/v1/suites/{suite_id}"
    };
  }
}

message GetSuiteRequest {
  string suite_id = 1;
}

message SuiteProfileOption {
  string file_name = 1;
  string label = 2;
  string description = 3;
  bool default = 4;
}

message SuiteFolderEntry {
  string name = 1;
  string role = 2;
  string description = 3;
  repeated string files = 4;
}

message SuiteHeader {
  string name = 1;
  string value = 2;
}

message SuiteExchangeExample {
  string name = 1;
  string source_artifact = 2;
  string dispatch_criteria = 3;
  repeated SuiteHeader request_headers = 4;
  string request_body = 5;
  string response_status = 6;
  string response_media_type = 7;
  repeated SuiteHeader response_headers = 8;
  string response_body = 9;
}

message SuiteApiOperation {
  string id = 1;
  string method = 2;
  string name = 3;
  string summary = 4;
  string contract_path = 5;
  string mock_path = 6;
  string mock_url = 7;
  string curl_command = 8;
  string dispatcher = 9;
  repeated SuiteExchangeExample exchanges = 10;
}

message SuiteApiSurface {
  string id = 1;
  string title = 2;
  string protocol = 3;
  string mock_host = 4;
  string description = 5;
  repeated SuiteApiOperation operations = 6;
}

message SuiteDefinition {
  string id = 1;
  string title = 2;
  string repository = 3;
  string owner = 4;
  string provider = 5;
  string version = 6;
  repeated string tags = 7;
  string description = 8;
  repeated string modules = 9;
  string status = 10;
  int32 score = 11;
  string pull_command = 12;
  string fork_command = 13;
  string suite_star = 14;
  repeated SuiteProfileOption profiles = 15;
  repeated SuiteFolderEntry folders = 16;
  repeated string contracts = 17;
  repeated SuiteApiSurface api_surfaces = 18;
}

message ListSuitesResponse {
  repeated SuiteDefinition suites = 1;
}
