syntax = "proto3";

package babelsuite.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/babelsuite/babelsuite/backend/gen/babelsuite/v1;bsv1";

service AuthService {
  rpc SignUp(SignUpRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/sign-up"
      body: "*"
    };
  }

  rpc SignIn(SignInRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/sign-in"
      body: "*"
    };
  }

  rpc GetCurrentUser(google.protobuf.Empty) returns (UserProfile) {
    option (google.api.http) = {
      get: "/api/v1/auth/me"
    };
  }

  rpc ListSSOProviders(google.protobuf.Empty) returns (ListSSOProvidersResponse) {
    option (google.api.http) = {
      get: "/api/v1/auth/sso/providers"
    };
  }
}

message SignUpRequest {
  string full_name = 1;
  string email = 2;
  string password = 3;
}

message SignInRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  UserProfile user = 2;
  Workspace workspace = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message UserProfile {
  string user_id = 1;
  string workspace_id = 2;
  string username = 3;
  string email = 4;
  string full_name = 5;
  bool is_admin = 6;
  google.protobuf.Timestamp created_at = 7;
}

message Workspace {
  string workspace_id = 1;
  string slug = 2;
  string name = 3;
  google.protobuf.Timestamp created_at = 4;
}

message SSOProvider {
  string provider_id = 1;
  string name = 2;
  string button_label = 3;
  string start_url = 4;
  bool enabled = 5;
  string hint = 6;
}

message ListSSOProvidersResponse {
  repeated SSOProvider providers = 1;
}
