syntax = "proto3";
package babelsuite.v1;
option go_package = "github.com/babelsuite/babelsuite/backend/gen/babelsuite/v1;bsv1";
import "google/protobuf/timestamp.proto";

message User {
  string user_id   = 1;
  string org_id    = 2;
  string username  = 3;
  string email     = 4;
  string name      = 5;
  google.protobuf.Timestamp created_at = 6;
}

message RegisterRequest {
  string username = 1;
  string email    = 2;
  string name     = 3;
  string password = 4;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message AuthResponse {
  string token = 1;
  User   user  = 2;
  Org    org   = 3;
}

message Org {
  string org_id     = 1;
  string slug       = 2;
  string name       = 3;
  google.protobuf.Timestamp created_at = 4;
}
