syntax = "proto3";

package babelsuite.examples.storefront.v1;

option go_package = "github.com/babelsuite/babelsuite/examples/oci-suites/storefront-browser-lab/api/proto;storefrontv1";

message CheckoutEvent {
  string order_id = 1;
  string sku = 2;
  string email = 3;
  string status = 4;
  string campaign = 5;
}

message CartEvent {
  string cart_id = 1;
  string sku = 2;
  string email = 3;
  string state = 4;
}
