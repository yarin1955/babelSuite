name: Local Debug
description: Verbose logs, mock email provider, and relaxed rate limits.
default: true
runtime:
  suite: notification-hub
  repository: localhost:5000/platform/notification-hub
  profileFile: local.yaml
modules:
  - redis
  - postgres
observability:
  logs: structured
  traces: enabled
  metrics: enabled
env:
  LOG_LEVEL: debug
  EMAIL_PROVIDER: mock
  RATE_LIMIT_RPS: "1000"
services:
  notification_api:
    env:
      API_PORT: 18090
      BATCH_SIZE: "50"
  dispatcher:
    env:
      POLL_INTERVAL_MS: "500"
      WORKER_CONCURRENCY: "2"
