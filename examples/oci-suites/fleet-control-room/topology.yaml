infra:
  postgres:
    image: postgres:15-alpine
    env:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pw
      POSTGRES_DB: fleet_db
  redis:
    image: redis:7-alpine
  kafka:
    image: bitnami/kafka:3.7
    env:
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

apps:
  api:
    image: ghcr.io/babelsuite/fleet-api:0.7.0
  ui:
    image: ghcr.io/babelsuite/fleet-ui:0.7.0
  worker:
    image: ghcr.io/babelsuite/fleet-worker:0.7.0

simulators:
  physics_engine:
    image: ghcr.io/babelsuite/drone-physics-sim:0.5.1
  telemetry_replay:
    image: ghcr.io/babelsuite/telemetry-replay:0.3.2

mocks:
  ledger:
    image: microcks/microcks-uber:1.10.1
  notifier:
    image: wiremock/wiremock:3.9.1

tests:
  backend_runner:
    image: python:3.11-slim
  frontend_runner:
    image: mcr.microsoft.com/playwright:v1.54.2-noble
  contract_runner:
    image: quay.io/microcks/microcks-cli:1.10.1
  async_runner:
    image: ghcr.io/asyncapi/cli:3.0.0
