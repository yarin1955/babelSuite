syntax = "proto3";

package babelsuite.examples.fleet.v1;

option go_package = "github.com/babelsuite/babelsuite/examples/fleet/v1;fleetv1";

message DeviceRef {
  string device_id = 1;
}

message DeviceRecord {
  string device_id = 1;
  string region = 2;
  string status = 3;
}

message ReserveDockRequest {
  string device_id = 1;
  string dock_id = 2;
}

message ReserveDockResponse {
  bool accepted = 1;
  string reservation_id = 2;
}

service FleetProvisioningService {
  rpc GetDevice(DeviceRef) returns (DeviceRecord);
  rpc ReserveDock(ReserveDockRequest) returns (ReserveDockResponse);
}
