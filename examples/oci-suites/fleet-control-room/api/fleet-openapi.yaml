openapi: 3.0.3
info:
  title: Fleet Control API
  version: 0.1.0
  description: REST contract for device state, alert summaries, and health checks.
servers:
  - url: http://fleet-api:8080
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok, service]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
  /api/fleet/summary:
    get:
      operationId: getFleetSummary
      responses:
        '200':
          description: Fleet summary snapshot
          content:
            application/json:
              schema:
                type: object
                required: [devices, activeAlerts, replayWindowMinutes]
                properties:
                  devices:
                    type: integer
                  activeAlerts:
                    type: integer
                  replayWindowMinutes:
                    type: integer
  /api/fleet/devices/{deviceId}:
    get:
      operationId: getDevice
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Device not found
components:
  schemas:
    Device:
      type: object
      required: [deviceId, status, region]
      properties:
        deviceId:
          type: string
        status:
          type: string
          enum: [active, charging, offline, maintenance]
        region:
          type: string
