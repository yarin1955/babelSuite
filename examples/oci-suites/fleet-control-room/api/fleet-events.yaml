asyncapi: 2.6.0
info:
  title: Fleet Event Stream
  version: 0.1.0
  description: Event contract for telemetry and alert propagation.
servers:
  kafka:
    url: kafka-broker:9092
    protocol: kafka
channels:
  fleet.alerts:
    subscribe:
      message:
        $ref: '#/components/messages/FleetAlert'
  fleet.telemetry:
    subscribe:
      message:
        $ref: '#/components/messages/TelemetryBatch'
components:
  messages:
    FleetAlert:
      name: FleetAlert
      payload:
        type: object
        required: [eventType, severity, deviceId, region]
        properties:
          eventType:
            type: string
            const: fleet.alert.raised
          severity:
            type: string
            enum: [info, warning, critical]
          deviceId:
            type: string
          region:
            type: string
    TelemetryBatch:
      name: TelemetryBatch
      payload:
        type: object
        required: [eventType, batchId, deviceCount]
        properties:
          eventType:
            type: string
            const: fleet.telemetry.batch
          batchId:
            type: string
          deviceCount:
            type: integer
