profile:
  name: default
  description: Developer-sized environment with one simulator and standard checks.

inputs:
  storm_profile: clear_skies
  seed_alerts: 2
  enable_mock_ledger: true
  replay_window_minutes: 15

runtime:
  parallelism: 2
  test_timeout_minutes: 20

apps:
  api:
    env:
      LOG_LEVEL: info
      FEATURE_AUDIT_MODE: "true"
  ui:
    env:
      API_BASE_URL: http://fleet-api:8080

tests:
  backend_runner:
    env:
      PYTEST_ADDOPTS: -q
