kind: OCIExampleModule
metadata:
  id: stdlib-postgres
  title: @babelsuite/postgres
spec:
  repository: localhost:5000/babelsuite/postgres
  provider: Stdlib
  version: 1.4.0
  entrypoint: module.star
  tags:
    - 1.4.0
    - 1.3.2
    - latest
  description: Pure Starlark Postgres module built on top of BabelSuite's built-in runtime containers.
  pullCommand: babelctl run localhost:5000/babelsuite/postgres:1.4.0
  forkCommand: babelctl fork localhost:5000/babelsuite/postgres:1.4.0 ./stdlib-postgres
