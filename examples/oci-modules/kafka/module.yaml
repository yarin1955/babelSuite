kind: OCIExampleModule
metadata:
  id: stdlib-kafka
  title: @babelsuite/kafka
spec:
  repository: localhost:5000/babelsuite/kafka
  provider: Stdlib
  version: 1.2.3
  tags:
    - 1.2.3
    - 1.2.2
    - latest
